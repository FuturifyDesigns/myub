<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - MyUB</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1a365d">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Outfit:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #1a365d;
            --navy-light: #2c5282;
            --navy-dark: #0f2744;
            --navy-darker: #081726;
            --red: #c41e3a;
            --white: #ffffff;
        }

        html { height: 100%; background: var(--navy-darker); }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 18% 12%, rgba(58, 111, 168, 0.22) 0%, transparent 45%),
                radial-gradient(circle at 82% 88%, rgba(196, 30, 58, 0.14) 0%, transparent 50%),
                linear-gradient(160deg, #0f2744 0%, #1a365d 45%, #0f2744 100%);
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.8), transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.8), transparent 75%);
        }

        .card {
            position: relative;
            width: min(440px, 100%);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 44px 28px 26px;
            text-align: center;
            box-shadow:
                0 30px 80px -20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .card-logo {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 18px 10px 12px;
            background: var(--navy-dark);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            box-shadow: 0 14px 34px rgba(0,0,0,0.45), 0 0 0 4px rgba(15, 39, 68, 0.5);
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .code-ring {
            width: 96px;
            height: 96px;
            margin: 10px auto 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.2) 0%, rgba(196, 30, 58, 0.04) 60%, transparent 100%);
            position: relative;
        }

        .code-ring::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(196, 30, 58, 0.35);
        }

        .code-badge {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--red) 0%, #9a1730 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sora', sans-serif;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 10px 30px -6px rgba(196, 30, 58, 0.55);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 30px;
            font-weight: 600;
            font-style: italic;
            line-height: 1.15;
            margin-bottom: 10px;
        }

        .lead {
            color: rgba(255, 255, 255, 0.72);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        .path-box {
            display: inline-block;
            max-width: 100%;
            margin-bottom: 22px;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            word-break: break-all;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 18px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy) 100%);
            color: var(--white);
            box-shadow: 0 10px 30px -10px rgba(26, 54, 93, 0.8);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--red) 0%, #9a1730 100%);
            transform: translateY(-2px);
            box-shadow: 0 16px 40px -10px rgba(196, 30, 58, 0.5);
        }

        .btn-ghost {
            background: transparent;
            color: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--white);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .footer {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 480px) {
            .card { padding: 40px 22px 22px; }
            h1 { font-size: 26px; }
            .card-logo { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="page-bg" aria-hidden="true"></div>

    <main class="card">
        <div class="card-logo" aria-hidden="true">MyUB</div>

        <div class="code-ring" aria-hidden="true">
            <div class="code-badge">404</div>
        </div>

        <h1>Page not found</h1>
        <p class="lead">The page you are looking for does not exist or may have been moved.</p>
        <div class="path-box" id="requestedPath" hidden></div>

        <div class="actions">
            <a class="btn btn-primary" href="/">Back to home</a>
            <a class="btn btn-ghost" href="/dashboard.html">Go to dashboard</a>
        </div>

        <p class="footer">
            MyUB &middot; University of Botswana Student Portal<br>
            <a href="/privacy.html" style="color:rgba(255,255,255,0.65);">Privacy</a> ·
            <a href="/terms.html" style="color:rgba(255,255,255,0.65);">Terms</a> ·
            <a href="/cookies.html" style="color:rgba(255,255,255,0.65);">Cookies</a> ·
            <a href="/data-rights.html" style="color:rgba(255,255,255,0.65);">Your Rights</a>
        </p>
    </main>

    <script>
        (function () {
            var path = window.location.pathname + window.location.search + window.location.hash;
            if (path && path !== '/' && path !== '/index.html') {
                var el = document.getElementById('requestedPath');
                el.textContent = path;
                el.hidden = false;
            }
        })();
    </script>
</body>
</html>
