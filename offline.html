<!DOCTYPE html>
<html lang="en" class="myub-enhanced">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - MyUB</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="myub-theme.css?v=35">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Source Sans 3", Outfit, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7fb;
            padding: 20px;
            color: #102a43;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 48px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #d9e2ec;
            box-shadow: 0 12px 32px rgba(16,42,67,0.1);
        }
        .icon {
            width: 72px;
            height: 72px;
            background: #e8f1fb;
            border: 1px solid #c5daf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            color: #1a4b8c;
        }
        .icon svg { width: 34px; height: 34px; stroke: currentColor; }
        h1 {
            font-family: "Libre Baskerville", Georgia, serif;
            font-size: 24px;
            font-weight: 700;
            color: #102a43;
            margin-bottom: 12px;
        }
        p { color: #486581; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            background: #1a4b8c;
            color: #fff;
            cursor: pointer;
        }
        .btn:hover { background: #12366a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" aria-hidden="true">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 1l22 22"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <circle cx="12" cy="20" r="1"/>
            </svg>
        </div>
        <h1>You're offline</h1>
        <p>Check your internet connection, then try again. MyUB needs a connection to load your courses and messages.</p>
        <button class="btn" type="button" onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
