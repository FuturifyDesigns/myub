<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - MyUB</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1a4b8c">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Sans 3', system-ui, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            color: #102a43;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            background: #f4f7fb;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            width: min(440px, 100%);
            background: #fff;
            border: 1px solid #d9e2ec;
            border-radius: 16px;
            padding: 40px 28px 26px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(16, 42, 67, 0.08);
            position: relative;
        }
        .card-logo {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 18px;
            background: #fff;
            border: 1px solid #d9e2ec;
            border-radius: 999px;
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: 22px;
            font-weight: 700;
            color: #1a4b8c;
            box-shadow: 0 2px 8px rgba(16, 42, 67, 0.06);
        }
        .code-badge {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 12px auto 16px;
            background: #e8f1fb;
            border: 1px solid #c5daf5;
            color: #1a4b8c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: 20px;
            font-weight: 700;
        }
        h1 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .lead {
            color: #627d98;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .path-box {
            display: inline-block;
            max-width: 100%;
            margin-bottom: 22px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #f0f4f8;
            border: 1px solid #d9e2ec;
            font-family: ui-monospace, Consolas, monospace;
            font-size: 12px;
            color: #486581;
            word-break: break-all;
        }
        .actions { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 13px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid transparent;
            transition: background 0.15s ease, transform 0.12s ease;
        }
        .btn-primary { background: #1a4b8c; color: #fff; border-color: #12366a; }
        .btn-primary:hover { background: #2563a8; transform: translateY(-1px); }
        .btn-ghost { background: #fff; color: #1a4b8c; border-color: #bcccdc; }
        .btn-ghost:hover { background: #f0f4f8; }
        .footer {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid #e6eef6;
            font-size: 12px;
            color: #627d98;
            line-height: 1.7;
        }
        .footer a { color: #1a4b8c; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="card">
        <div class="card-logo" aria-hidden="true">MyUB</div>
        <div class="code-badge" aria-hidden="true">404</div>
        <h1>Page not found</h1>
        <p class="lead">The page you are looking for does not exist or may have been moved.</p>
        <div class="path-box" id="requestedPath" hidden></div>
        <div class="actions">
            <a class="btn btn-primary" href="/">Back to home</a>
            <a class="btn btn-ghost" href="/dashboard.html">Go to dashboard</a>
        </div>
        <p class="footer">
            MyUB &middot; University of Botswana Student Portal<br>
            <a href="/privacy.html">Privacy</a> ·
            <a href="/terms.html">Terms</a> ·
            <a href="/cookies.html">Cookies</a> ·
            <a href="/data-rights.html">Your Rights</a>
        </p>
    </main>
    <script>
        (function () {
            var path = window.location.pathname + window.location.search + window.location.hash;
            if (path && path !== '/' && path !== '/index.html') {
                var el = document.getElementById('requestedPath');
                el.textContent = path;
                el.hidden = false;
            }
        })();
    </script>
</body>
</html>
